<!DOCTYPE html>

    <title>DNP Verify - Mehedi Hasan</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f2f6fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: #ffffff;
            width: 350px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            overflow: hidden;
            text-align: center;
            border: 1px solid #e0e0e0;
        }

        .header {
            background: #0a66c2;
            color: white;
            padding: 20px;
        }

        .header h2 { margin: 0; font-size: 22px; }
        .header small { font-size: 13px; opacity: 0.9; }

        .profile { padding: 20px; }

        .profile img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #0a66c2;
            margin-bottom: 10px;
        }

        .name { 
            font-size: 22px; 
            font-weight: bold; 
            color: #333; 
            text-transform: uppercase;
            margin-top: 5px;
        }
        
        .role { 
            color: #0a66c2; 
            margin-bottom: 20px; 
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .info {
            text-align: left;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.6;
        }

        .info p { 
            margin: 5px 0; 
            color: #444; 
            border-bottom: 1px dashed #ddd; 
            padding-bottom: 2px; 
            display: flex; /* তথ্যগুলোকে এক লাইনে পাশাপাশি রাখার জন্য */
            align-items: flex-start;
        }

        .info p:last-child { border-bottom: none; }

        .info strong { 
            color: #000; 
            white-space: nowrap; /* লেবেল যেন ভেঙে নিচে না যায় */
            margin-right: 8px;    /* লেবেল এবং কোলনের মাঝখানের ফাঁকা অংশ */
        }

        .status {
            background: #e6f9ec;
            color: #0f9d58;
            padding: 12px;
            margin: 20px;
            border-radius: 8px;
            font-weight: bold;
            border: 1px solid #0f9d58;
            font-size: 14px;
        }

        .footer {
            background: #0a66c2;
            color: white;
            padding: 10px;
            font-size: 11px;
        }

        .footer a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
